{% extends 'base.html' %}

{% block title %}Update Today's Menu - {{ mess.name }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md overflow-hidden">
    <div class="p-6 md:p-8">
        <div class="mb-6 border-b pb-4">
            <h1 class="text-2xl font-bold text-gray-900">Update Today's Menu</h1>
            <p class="text-gray-600 mt-1">For <span class="font-bold text-orange-600">{{ mess.name }}</span> ({{ menu.date }})</p>
        </div>

        <form method="post" action="{% url 'update_menu' mess.id %}" class="space-y-6">
            {% csrf_token %}
            
            <!-- Breakfast -->
            <div>
                <label for="breakfast" class="block text-sm font-bold text-gray-700 mb-1"><i class="fa-solid fa-sun text-yellow-500 mr-1"></i> Breakfast Items</label>
                <p class="text-xs text-gray-500 mb-2">List items on separate lines (press Enter between items)</p>
                <textarea id="breakfast" name="breakfast" rows="3" class="shadow-sm focus:ring-orange-500 focus:border-orange-500 mt-1 block w-full sm:text-sm border border-gray-300 rounded-md p-3" placeholder="Enter breakfast options...">{{ menu.breakfast_items }}</textarea>
            </div>

            <!-- Lunch -->
            <div>
                <label for="lunch" class="block text-sm font-bold text-gray-700 mb-1"><i class="fa-solid fa-cloud-sun text-orange-500 mr-1"></i> Lunch Items</label>
                <textarea id="lunch" name="lunch" rows="3" class="shadow-sm focus:ring-orange-500 focus:border-orange-500 mt-1 block w-full sm:text-sm border border-gray-300 rounded-md p-3" placeholder="Enter lunch options...">{{ menu.lunch_items }}</textarea>
            </div>

            <!-- Dinner -->
            <div>
                <label for="dinner" class="block text-sm font-bold text-gray-700 mb-1"><i class="fa-solid fa-moon text-indigo-400 mr-1"></i> Dinner Items</label>
                <textarea id="dinner" name="dinner" rows="3" class="shadow-sm focus:ring-orange-500 focus:border-orange-500 mt-1 block w-full sm:text-sm border border-gray-300 rounded-md p-3" placeholder="Enter dinner options...">{{ menu.dinner_items }}</textarea>
            </div>

            <div class="pt-4 flex items-center justify-between border-t border-gray-200">
                <a href="{% url 'mess_detail' mess.id %}" class="text-gray-600 hover:text-gray-900 font-medium text-sm">Cancel</a>
                <button type="submit" class="bg-orange-600 text-white font-bold py-2 px-6 rounded hover:bg-orange-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500">
                    Save Menu
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
